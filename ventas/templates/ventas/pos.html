<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Punto de Venta - Papelería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .resumen-venta { background-color: #f8f9fa; height: 100vh; padding: 20px; border-left: 1px solid #ddd; }
        .lista-productos { height: 100vh; overflow-y: auto; padding: 20px; }
        .card-producto { cursor: pointer; transition: transform 0.1s; }
        .card-producto:hover { transform: scale(1.02); border-color: #0d6efd; }
        .producto-sin-stock { opacity: 0.6; pointer-events: none; background-color: #eee; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-8 lista-productos">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>📦 Productos</h2>
                <input type="text" id="buscador" class="form-control w-50" placeholder="Buscar por nombre o código...">
            </div>

            <div class="row" id="grid-productos">
                <div class="col-12 text-center mt-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p>Cargando inventario...</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 resumen-venta">
            <div class="d-flex justify-content-between">
                <h4>Ticket de Venta</h4>
                {% if caja %}
                    <span class="badge bg-success">Caja #{{ caja.id }} Abierta</span>
                {% else %}
                    <span class="badge bg-danger">⚠️ CAJA CERRADA</span>
                {% endif %}
            </div>
            <hr>
            
            <div style="height: 60%; overflow-y: auto;">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Prod</th>
                            <th>Cant</th>
                            <th>Total</th>
                            <th>X</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-carrito"></tbody>
                </table>
            </div>

            <div class="mt-3">
                <div class="d-flex justify-content-between fs-4 fw-bold">
                    <span>TOTAL:</span>
                    <span id="total-pagar">$0</span>
                </div>
                
                <div class="d-grid gap-2 mt-3">
                    <button class="btn btn-primary btn-lg" onclick="procesarVenta()" {% if not caja %}disabled{% endif %}>
                        💸 COBRAR
                    </button>
                    <button class="btn btn-outline-danger" onclick="limpiarCarrito()">Limpiar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let carrito = [];
    let inventarioGlobal = [];
    const CAJA_ID = "{{ caja.id|default:'' }}";

    // 1. Cargar productos al iniciar
    document.addEventListener('DOMContentLoaded', async () => {
        await cargarProductos();
    });

    async function cargarProductos() {
        try {
            const response = await fetch('/api/inventario/listar-pos/');
            if (!response.ok) throw new Error("Error en la API");
            
            const productos = await response.json();
            inventarioGlobal = productos;
            pintarProductos(inventarioGlobal);
            
        } catch (error) {
            console.error(error);
            document.getElementById('grid-productos').innerHTML = 
                '<div class="alert alert-danger">Error cargando productos. Revisa que el servidor esté corriendo.</div>';
        }
    }

    function pintarProductos(lista) {
        const grid = document.getElementById('grid-productos');
        grid.innerHTML = '';

        if (lista.length === 0) {
            grid.innerHTML = '<p class="text-muted text-center">No se encontraron productos.</p>';
            return;
        }

        lista.forEach(prod => {
            const precioFmt = parseFloat(prod.precio_venta).toLocaleString();
            
            grid.innerHTML += `
                <div class="col-md-3 mb-3">
                    <div class="card card-producto h-100" 
                         onclick="agregarAlCarrito(${prod.id}, '${prod.nombre}', ${prod.precio_venta})">
                        <div class="card-body text-center p-2">
                            <h6 class="card-title text-truncate" title="${prod.nombre}">${prod.nombre}</h6>
                            <p class="card-text text-primary fw-bold mb-1">$${precioFmt}</p>
                            <small class="text-muted" style="font-size: 0.7rem;">${prod.codigo_interno || prod.codigo_barras || ''}</small>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // 2. Buscador
    document.getElementById('buscador').addEventListener('input', (e) => {
        const texto = e.target.value.toLowerCase();
        const filtrados = inventarioGlobal.filter(p => 
            p.nombre.toLowerCase().includes(texto) || 
            (p.codigo_barras && p.codigo_barras.includes(texto)) ||
            (p.codigo_interno && p.codigo_interno.toLowerCase().includes(texto))
        );
        pintarProductos(filtrados);
    });

    // 3. Lógica del Carrito
    function agregarAlCarrito(id, nombre, precio) {
        const existente = carrito.find(item => item.id === id);
        if (existente) {
            existente.cantidad++;
        } else {
            carrito.push({ id, nombre, precio, cantidad: 1 });
        }
        renderizarCarrito();
    }

    function renderizarCarrito() {
        const tbody = document.getElementById('tabla-carrito');
        tbody.innerHTML = '';
        let total = 0;

        carrito.forEach((item, index) => {
            const subtotal = item.precio * item.cantidad;
            total += subtotal;
            
            tbody.innerHTML += `
                <tr>
                    <td><small>${item.nombre}</small></td>
                    <td>
                        <button class="btn btn-sm py-0 btn-light border" onclick="cambiarCant(${index}, -1)">-</button>
                        ${item.cantidad}
                        <button class="btn btn-sm py-0 btn-light border" onclick="cambiarCant(${index}, 1)">+</button>
                    </td>
                    <td>$${subtotal.toLocaleString()}</td>
                    <td><button class="btn btn-danger btn-sm py-0" onclick="eliminar(${index})">&times;</button></td>
                </tr>
            `;
        });
        document.getElementById('total-pagar').innerText = `$${total.toLocaleString()}`;
    }

    function cambiarCant(index, delta) {
        carrito[index].cantidad += delta;
        if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
        renderizarCarrito();
    }

    function eliminar(index) {
        carrito.splice(index, 1);
        renderizarCarrito();
    }

    function limpiarCarrito() {
        carrito = [];
        renderizarCarrito();
    }

    // 4. Procesar Venta
    async function procesarVenta() {
        if (carrito.length === 0) return alert("Carrito vacío");
        if (!CAJA_ID) return alert("Error: No hay caja abierta.");

        const datos = {
            sesion_caja: CAJA_ID,
            metodo_pago: "EFECTIVO",
            cliente_nombre: "Cliente Mostrador",
            detalles: carrito.map(i => ({ producto_id: i.id, cantidad: i.cantidad }))
        };

        try {
            const res = await fetch('/api/ventas/crear/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken') // Función auxiliar abajo
                },
                body: JSON.stringify(datos)
            });

            const json = await res.json();

            if (res.ok) {
                alert(`✅ Venta Registrada! ID: ${json.venta_id}`);
                limpiarCarrito();
            } else {
                alert("❌ Error: " + JSON.stringify(json));
            }
        } catch (e) {
            alert("Error de conexión");
        }
    }

    // Función para obtener el token CSRF de Django (Seguridad)
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

</body>
</html>
